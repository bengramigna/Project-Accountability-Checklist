openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Responsiboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: friends
  - name: projects
  - name: tasks
  - name: notes
  - name: documents
  - name: messages
  - name: dashboard
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently logged-in user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/signup:
    post:
      operationId: signUp
      tags: [auth]
      summary: Create an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/login:
    post:
      operationId: logIn
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogInInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/logout:
    post:
      operationId: logOut
      tags: [auth]
      summary: Log out
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/accept-cookies:
    post:
      operationId: acceptCookies
      tags: [auth]
      summary: Mark cookies as accepted for current user
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /friends:
    get:
      operationId: listFriends
      tags: [friends]
      summary: List my friends
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /friends/search:
    get:
      operationId: searchUsers
      tags: [friends]
      summary: Search users by name or username
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserWithFriendStatus"

  /friends/{userId}:
    post:
      operationId: addFriend
      tags: [friends]
      summary: Add a friend
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
    delete:
      operationId: removeFriend
      tags: [friends]
      summary: Remove a friend
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects I belong to
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectSummary"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update project name or deadline
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /projects/{projectId}/members:
    get:
      operationId: listProjectMembers
      tags: [projects]
      summary: List project members
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: inviteToProject
      tags: [projects]
      summary: Invite a friend to the project
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteToProjectInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /projects/{projectId}/tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks for project
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{taskId}:
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update task (claim, complete, change deadline)
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /projects/{projectId}/notes:
    get:
      operationId: listNotes
      tags: [notes]
      summary: List notes for project
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      operationId: createNote
      tags: [notes]
      summary: Create a note
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /notes/{noteId}:
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Delete a note
      parameters:
        - name: noteId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /projects/{projectId}/documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents for project
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Register a document for the project (filename + size only)
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{documentId}:
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: documentId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /projects/{projectId}/messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List chat messages for project
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a chat message
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageInput"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Overview totals across all projects
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/upcoming:
    get:
      operationId: getUpcomingDeadlines
      tags: [dashboard]
      summary: Upcoming task and project deadlines
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UpcomingDeadline"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent activity feed
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /projects/{projectId}/stats:
    get:
      operationId: getProjectStats
      tags: [projects]
      summary: Per-project completion + workload stats
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    OkResponse:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]

    User:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        email: { type: string }
        cookiesAccepted: { type: boolean }
      required: [id, username, displayName, email, cookiesAccepted]

    UserWithFriendStatus:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        email: { type: string }
        isFriend: { type: boolean }
      required: [id, username, displayName, email, isFriend]

    SignUpInput:
      type: object
      properties:
        username: { type: string, minLength: 2 }
        displayName: { type: string, minLength: 1 }
        email: { type: string }
        password: { type: string, minLength: 4 }
      required: [username, displayName, email, password]

    LogInInput:
      type: object
      properties:
        username: { type: string }
        password: { type: string }
      required: [username, password]

    ProjectSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        deadline: { type: string, nullable: true }
        memberCount: { type: integer }
        taskCount: { type: integer }
        completedTaskCount: { type: integer }
        ownerId: { type: string }
        createdAt: { type: string }
      required: [id, name, memberCount, taskCount, completedTaskCount, ownerId, createdAt]

    Project:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        deadline: { type: string, nullable: true }
        ownerId: { type: string }
        createdAt: { type: string }
      required: [id, name, ownerId, createdAt]

    CreateProjectInput:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        memberIds:
          type: array
          items: { type: string }
      required: [name, memberIds]

    UpdateProjectInput:
      type: object
      properties:
        name: { type: string }
        deadline: { type: string, nullable: true }

    InviteToProjectInput:
      type: object
      properties:
        userId: { type: string }
      required: [userId]

    Task:
      type: object
      properties:
        id: { type: string }
        projectId: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        assigneeId: { type: string, nullable: true }
        deadline: { type: string, nullable: true }
        completed: { type: boolean }
        createdAt: { type: string }
      required: [id, projectId, title, completed, createdAt]

    CreateTaskInput:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string, nullable: true }
        assigneeId: { type: string, nullable: true }
        deadline: { type: string, nullable: true }
      required: [title]

    UpdateTaskInput:
      type: object
      properties:
        title: { type: string }
        description: { type: string, nullable: true }
        assigneeId: { type: string, nullable: true }
        deadline: { type: string, nullable: true }
        completed: { type: boolean }

    Note:
      type: object
      properties:
        id: { type: string }
        projectId: { type: string }
        authorId: { type: string }
        authorName: { type: string }
        body: { type: string }
        createdAt: { type: string }
      required: [id, projectId, authorId, authorName, body, createdAt]

    CreateNoteInput:
      type: object
      properties:
        body: { type: string, minLength: 1 }
      required: [body]

    Document:
      type: object
      properties:
        id: { type: string }
        projectId: { type: string }
        filename: { type: string }
        sizeBytes: { type: integer }
        uploadedById: { type: string }
        uploadedByName: { type: string }
        createdAt: { type: string }
      required: [id, projectId, filename, sizeBytes, uploadedById, uploadedByName, createdAt]

    CreateDocumentInput:
      type: object
      properties:
        filename: { type: string, minLength: 1 }
        sizeBytes: { type: integer, minimum: 0 }
      required: [filename, sizeBytes]

    Message:
      type: object
      properties:
        id: { type: string }
        projectId: { type: string }
        authorId: { type: string }
        authorName: { type: string }
        body: { type: string }
        createdAt: { type: string }
      required: [id, projectId, authorId, authorName, body, createdAt]

    SendMessageInput:
      type: object
      properties:
        body: { type: string, minLength: 1 }
      required: [body]

    DashboardSummary:
      type: object
      properties:
        projectCount: { type: integer }
        friendCount: { type: integer }
        openTasks: { type: integer }
        completedTasks: { type: integer }
        myOpenTasks: { type: integer }
        upcomingDeadlineCount: { type: integer }
      required: [projectCount, friendCount, openTasks, completedTasks, myOpenTasks, upcomingDeadlineCount]

    UpcomingDeadline:
      type: object
      properties:
        kind:
          type: string
          enum: [task, project]
        id: { type: string }
        title: { type: string }
        projectId: { type: string }
        projectName: { type: string }
        deadline: { type: string }
        assigneeName: { type: string, nullable: true }
      required: [kind, id, title, projectId, projectName, deadline]

    ActivityItem:
      type: object
      properties:
        id: { type: string }
        kind:
          type: string
          enum: [task_created, task_completed, note_added, message_sent, document_added, project_created, member_joined]
        projectId: { type: string }
        projectName: { type: string }
        actorName: { type: string }
        summary: { type: string }
        createdAt: { type: string }
      required: [id, kind, projectId, projectName, actorName, summary, createdAt]

    MemberWorkload:
      type: object
      properties:
        userId: { type: string }
        displayName: { type: string }
        assignedCount: { type: integer }
        completedCount: { type: integer }
      required: [userId, displayName, assignedCount, completedCount]

    ProjectStats:
      type: object
      properties:
        totalTasks: { type: integer }
        completedTasks: { type: integer }
        overdueTasks: { type: integer }
        unassignedTasks: { type: integer }
        memberWorkload:
          type: array
          items:
            $ref: "#/components/schemas/MemberWorkload"
      required: [totalTasks, completedTasks, overdueTasks, unassignedTasks, memberWorkload]
